"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](cyan)\
[39](bg:cyan fg:background)\
$username\
[](bg:background fg:cyan)\
$directory\
[](fg:background bg:green)\
$git_branch(fg:foreground bg:green)\
$git_status\
[](fg:green bg:red)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:red bg:background)\
$docker_context\
$conda\
$pixi\
[ ](background)\
$line_break$character"""

# Use the color palette
palette = "miku"

[palettes.miku]
background = "#137a7f"
current_line = "#232f7b"
foreground = "#ffffeb"
comment = "#0e85a3"
cyan = "#86cecb"
green = "#09eda9"
orange = "#f5ff87"
pink = "#e12885"
purple = "#a5157a"
red = "#e23d69"
yellow = "#f5ff87"


[os]
disabled = false
style = "bg:cyan fg:background"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:cyan    fg:background"
style_root = "bg:cyan fg:background"
format = '[ $user ]($style)'

[directory]
style = "fg:foreground bg:background"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = " "
"Code" = " "

[git_branch]
symbol = ""
style = "bg:green"
format = '[[ $symbol $branch ](fg:background bg:green)](fg:background bg:green)'

[git_status]
style = "bg:green"
format = '[[($all_status$ahead_behind )](fg:background bg:green)]($style)'

[nodejs]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[c]
symbol = " "
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[cpp]
symbol = " "
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[rust]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[golang]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[php]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[java]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[kotlin]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[haskell]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[python]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $version) ](fg:background bg:red)]($style)'

[docker_context]
symbol = ""
style = "bg:foreground"
format = '[[ $symbol( $context) ](fg:#83a598 bg:red)]($style)'

[conda]
style = "bg:foreground"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:red)]($style)'

[pixi]
style = "bg:foreground"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:red)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:foreground"
format = '[[  $time ](fg:foreground bg:current_line)]($style)'

[line_break]
disabled = true

[character]
disabled = true
success_symbol = '[\$](bold fg:green)'
error_symbol = '[](bold fg:red)'
vimcmd_symbol = '[>](bold fg:green)'
vimcmd_replace_one_symbol = '[](bold fg:purple)'
vimcmd_replace_symbol = '[](bold fg:purple)'
vimcmd_visual_symbol = '[](bold fg:yellow)'
